<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{% block title %}JobRadar{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="{{ url_for('index') }}" class="brand">
      <div class="brand-logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      Job<span>Radar</span>
    </a>
    <div class="nav-links">
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('api_jobs') }}" target="_blank">API</a>
    </div>
    <a href="{{ url_for('index') }}" class="nav-cta">Post a Search</a>
  </div>
</nav>

<main>{% block content %}{% endblock %}</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <div class="brand-logo" style="width:28px;height:28px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <span class="brand" style="font-size:1rem">Job<span>Radar</span></span>
    </div>
    <p>Built with Python · Flask · BeautifulSoup · Pandas &nbsp;|&nbsp; Academic Project</p>
  </div>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
